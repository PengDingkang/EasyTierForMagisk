name: Build Module

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck unzip

      - name: Read module metadata
        id: meta
        shell: bash
        run: |
          module_version="$(sed -n 's/^version=//p' module.prop)"
          core_version="$(tr -d '\r\n' < CORE_VERSION)"
          package_name="EasyTierForMagisk-${module_version}-core-${core_version}.zip"
          echo "module_version=${module_version}" >> "$GITHUB_OUTPUT"
          echo "core_version=${core_version}" >> "$GITHUB_OUTPUT"
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"

      - name: Validate shell scripts
        shell: bash
        run: |
          sh -n customize.sh
          sh -n boot-completed.sh
          sh -n uninstall.sh
          sh -n easytier
          shellcheck customize.sh
          shellcheck boot-completed.sh
          shellcheck uninstall.sh
          shellcheck easytier

      - name: Create module package
        shell: bash
        run: |
          mkdir -p dist
          zip -qr "dist/${{ steps.meta.outputs.package_name }}" \
            META-INF \
            webroot \
            boot-completed.sh \
            config.toml \
            customize.sh \
            easytier \
            easytier-cli \
            easytier-core \
            module.prop \
            uninstall.sh

      - name: Verify package contents
        shell: bash
        run: |
          package="dist/${{ steps.meta.outputs.package_name }}"
          unzip -Z -1 "$package" | tee package-list.txt

          required_paths=(
            "META-INF/"
            "META-INF/com/"
            "META-INF/com/google/"
            "META-INF/com/google/android/"
            "META-INF/com/google/android/update-binary"
            "META-INF/com/google/android/updater-script"
            "webroot/"
            "webroot/index.html"
            "boot-completed.sh"
            "config.toml"
            "customize.sh"
            "easytier"
            "easytier-cli"
            "easytier-core"
            "module.prop"
            "uninstall.sh"
          )

          forbidden_patterns=(
            "^tmp/"
            "^dist/"
            "^\\.git/"
            "^\\.github/"
            "^\\.gitattributes$"
            "^\\.gitignore$"
            "^README\\.md$"
            "^LICENSE$"
          )

          for path in "${required_paths[@]}"; do
            if ! grep -Fxq "$path" package-list.txt; then
              echo "Missing required path in package: $path"
              exit 1
            fi
          done

          for pattern in "${forbidden_patterns[@]}"; do
            if grep -Eq "$pattern" package-list.txt; then
              echo "Forbidden path matched in package: $pattern"
              exit 1
            fi
          done

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.meta.outputs.package_name }}
          path: dist/${{ steps.meta.outputs.package_name }}
          if-no-files-found: error
